<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REST Countries API</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/global.css" />
    <link rel="stylesheet" href="/pages/home-page.css" />

    <script
      src="https://kit.fontawesome.com/05ce772781.js"
      crossorigin="anonymous"
      async
    ></script>
  </head>
  <body>
    <header class="header">
      <div class="header__container">
        <h1>Where in the world?</h1>

        <button class="header__theme-btn">
          <i class="fa-regular fa-moon"></i>
          <span>Dark Mode</span>
        </button>
      </div>
    </header>

    <main class="main-container">
      <home-page></home-page>
    </main>

    <template id="home-page-template">
      <nav class="nav">
        <div class="nav__search-container">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input class="nav__search" placeholder="Search for a Country..." />
        </div>
      </nav>

      <ul class="country-cards"></ul>
    </template>

    <template id="country-card-template">
      <li class="country-card">
        <img src="https://flagcdn.com/af.svg" alt="" />

        <div class="country-card__content">
          <h2>Afghanistan</h2>
          <table class="country-card__data"></table>
        </div>
      </li>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
