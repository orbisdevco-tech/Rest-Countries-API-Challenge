<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REST Countries API</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />

    <!-- global CSS -->
    <link rel="stylesheet" href="/global.css" />
    <!-- components CSS -->
    <link rel="stylesheet" href="/components/country-card.css" />
    <link rel="stylesheet" href="/components/custom-select.css" />

    <!-- pages CSS -->
    <link rel="stylesheet" href="/pages/home-page.css" />
    <link rel="stylesheet" href="/pages/country-page.css" />

    <script
      src="https://kit.fontawesome.com/05ce772781.js"
      crossorigin="anonymous"
      async
    ></script>
  </head>
  <body>
    <header class="header">
      <div class="header__container">
        <h1>Where in the world?</h1>

        <button id="theme-toggle-btn" class="header__theme-btn">
          <i
            role="presentation"
            aria-hidden="true"
            class="fa-regular fa-moon visible-light"
          ></i>
          <i
            role="presentation"
            aria-hidden="true"
            class="fa-regular fa-sun visible-dark"
          ></i>
          <span>Dark Mode</span>
        </button>
      </div>
    </header>

    <main class="main-container">
      <!-- dynamically render -->
    </main>

    <template id="home-page-template">
      <nav class="nav">
        <div class="nav__search-container">
          <i aria-hidden="true" class="fa-solid fa-magnifying-glass"></i>
          <input class="nav__search" placeholder="Search for a Country..." />
        </div>

        <custom-select data-placeholder="Filter by Region">
          <li tabindex="0" value="africa">Africa</li>
          <li tabindex="0" value="americas">America</li>
          <li tabindex="0" value="asia">Asia</li>
          <li tabindex="0" value="europe">Europe</li>
          <li tabindex="0" value="oceania">Oceania</li>
        </custom-select>
      </nav>

      <ul class="country-cards"></ul>
    </template>

    <template id="country-page-template">
      <nav class="country-page__nav">
        <a href="/" class="back-btn">
          <i class="fa-solid fa-arrow-left"></i> Back
        </a>
      </nav>
      <article>
        <div>
          <img src="" alt="" />
        </div>
        <section>
          <h2 data-key="name">Belgium</h2>

          <div class="country-page__data-container">
            <dl>
              <div class="inline-flex">
                <dt>Native Name:</dt>
                <dd data-key="nativeName"></dd>
              </div>
              <div class="inline-flex">
                <dt>Population:</dt>
                <dd data-key="population"></dd>
              </div>
              <div class="inline-flex">
                <dt>Sub Region:</dt>
                <dd data-key="subregion"></dd>
              </div>
              <div class="inline-flex">
                <dt>Capital:</dt>
                <dd data-key="capital"></dd>
              </div>
            </dl>
            <dl>
              <div class="inline-flex">
                <dt>Top Level Domain:</dt>
                <dd data-key="topLevelDomain"></dd>
              </div>
              <div class="inline-flex">
                <dt>Currencies:</dt>
                <dd data-key="currencies"></dd>
              </div>
              <div class="inline-flex">
                <dt>Languages:</dt>
                <dd data-key="languages"></dd>
              </div>
            </dl>
          </div>

          <div class="country-page__borders-data">
            <span class="">Border Countries: </span>
            <ul></ul>
          </div>
        </section>
      </article>
    </template>

    <template id="country-card-template">
      <li class="country-card">
        <a href="/country">
          <img src="https://flagcdn.com/af.svg" alt="" />
          <div class="country-card__content">
            <h2>Afghanistan</h2>
            <table class="country-card__data"></table>
          </div>
        </a>
      </li>
    </template>

    <template id="custom-select-template">
      <div class="select">
        <button class="select__btn">
          <span></span>
          <i class="fa-solid fa-chevron-down"></i>
        </button>

        <ul class="select_options hidden">
          <slot></slot>
        </ul>
      </div>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
